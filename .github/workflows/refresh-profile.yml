name: Refresh "Currently building"

# Auto-refreshes the "Currently building" section of README.md from live GitHub
# data. Runs weekly + on demand. Opens a PR (rather than committing directly to
# main) so you can glance at the diff before it lands. If you want zero-touch,
# enable auto-merge on the PR after the first successful run.

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh README section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USER: ${{ github.repository_owner }}
        run: python .github/scripts/refresh_profile.py

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/refresh-currently-building
          delete-branch: true
          base: main
          title: "chore: refresh 'Currently building' from recent activity"
          commit-message: "chore: refresh 'Currently building' section"
          body: |
            Auto-generated by `.github/workflows/refresh-profile.yml`.

            Source: top non-fork, non-archived public repos owned by `${{ github.repository_owner }}`,
            ranked by `pushedAt`. Rewrites the section between the
            `CURRENTLY_BUILDING:START` / `END` markers.

            Close this PR if you don't want the change — the next scheduled run
            will overwrite the branch with whatever's current then.
